name: Source quality (daily)

# Scans the `listings` collection server-side and writes a single summary doc
# (data_stats/source_quality) the admin "Source Quality" panel reads. Read-only
# over listings — never modifies them. Idempotent; safe to re-run.
on:
  schedule:
    - cron: '30 3 * * *'    # 03:30 UTC daily (after the product sync at 02:00)
  workflow_dispatch:

concurrency:
  group: source-quality
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install ingestion deps
        working-directory: ingestion
        run: npm install --no-audit --no-fund
      - name: Compute source quality
        working-directory: ingestion
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node compute-source-quality.js
