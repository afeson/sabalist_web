name: Sabalist listing sync

# Continuous ingestion: pulls all enabled sources through the pipeline and
# writes to Firestore (auto-publish or review queue). Cadence is controlled here;
# per-source `schedule` fields document each source's intended frequency.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC)
  workflow_dispatch:         # manual "Run workflow" button
    inputs:
      dry:
        description: 'Dry run (no writes)'
        type: boolean
        default: false

concurrency:
  group: ingestion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ingestion deps
        working-directory: ingestion
        run: npm install --no-audit --no-fund
      - name: Run sync
        working-directory: ingestion
        env:
          # Firestore admin credentials — add this repo secret (JSON string).
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Add any source API keys as secrets and reference them in source `fetch.headers`.
        run: |
          if [ "${{ inputs.dry }}" = "true" ]; then
            node sync.js --dry
          else
            node sync.js --expire
          fi
