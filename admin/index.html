<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Sabalist Ingestion Admin</title>
  <style>
    :root { --red:#E50914; --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --muted:#8a93a6; --ok:#22c55e; --warn:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#e8edf6; }
    header { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); }
    header h1 { font-size:16px; margin:0; }
    header .sp { flex:1; }
    button { background:var(--red); color:#fff; border:0; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:600; }
    button.ghost { background:transparent; border:1px solid var(--line); color:#cdd5e3; }
    button.ok { background:var(--ok); } button.bad { background:#444; }
    nav { display:flex; gap:6px; padding:12px 20px; }
    nav a { padding:8px 12px; border-radius:8px; color:var(--muted); cursor:pointer; font-weight:600; font-size:14px; }
    nav a.active { background:var(--card); color:#fff; }
    main { padding:0 20px 40px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:10px 0 20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
    .card .n { font-size:28px; font-weight:800; } .card .l { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th,td { text-align:left; padding:10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .tag { font-size:11px; padding:2px 8px; border-radius:999px; background:#2a2f3a; color:#cdd5e3; }
    .tag.warn { background:#3a2e12; color:var(--warn); } .tag.dup { background:#3a1f2a; color:#f472b6; }
    .login { max-width:360px; margin:80px auto; text-align:center; }
    .login input { width:100%; padding:12px; border-radius:8px; border:1px solid var(--line); background:#11141a; color:#fff; margin:8px 0; }
    .muted { color:var(--muted); } .hidden { display:none; } .row-actions { white-space:nowrap; }
    a.ext { color:#7aa2ff; text-decoration:none; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="login" class="login">
    <h1>Sabalist Ingestion Admin</h1>
    <p class="muted">Sign in with an authorized admin email.</p>
    <input id="email" type="email" placeholder="you@email.com" />
    <button id="googleBtn">Sign in with Google</button>
    <p id="loginMsg" class="muted"></p>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header>
      <h1>🌍 Sabalist Ingestion</h1>
      <span class="tag" id="who"></span>
      <span class="sp"></span>
      <button class="ghost" id="refreshBtn">Refresh</button>
      <button class="ghost" id="logoutBtn">Sign out</button>
    </header>
    <nav>
      <a data-tab="overview" class="active">Overview</a>
      <a data-tab="review">Review Queue</a>
      <a data-tab="sources">Source Health</a>
      <a data-tab="sourcetoggle">Sources</a>
      <a data-tab="quality">Source Quality</a>
      <a data-tab="failed">Failed Imports</a>
      <a data-tab="config">Marketplace Config</a>
    </nav>
    <main>
      <section id="overview"></section>
      <section id="review" class="hidden"></section>
      <section id="sources" class="hidden"></section>
      <section id="sourcetoggle" class="hidden"></section>
      <section id="quality" class="hidden"></section>
      <section id="failed" class="hidden"></section>
      <section id="config" class="hidden"></section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./config.js"></script>
  <script>
  (function () {
    const CFG = window.SABALIST_ADMIN_CONFIG;
    if (!CFG) { document.getElementById('loginMsg').textContent = 'Missing admin/config.js (copy from config.example.js).'; return; }
    firebase.initializeApp(CFG.firebase);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[<>&]/g, (c) => ({ '<':'&lt;','>':'&gt;','&':'&amp;' }[c]));
    const isAdmin = (u) => u && CFG.adminEmails.map((e)=>e.toLowerCase()).includes((u.email||'').toLowerCase());

    // ---- auth ----
    $('googleBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch((e)=>$('loginMsg').textContent=e.message);
    $('logoutBtn').onclick = () => auth.signOut();
    auth.onAuthStateChanged((u) => {
      if (u && isAdmin(u)) {
        $('login').classList.add('hidden'); $('app').classList.remove('hidden');
        $('who').textContent = u.email; loadAll();
      } else {
        $('app').classList.add('hidden'); $('login').classList.remove('hidden');
        if (u && !isAdmin(u)) { $('loginMsg').textContent = 'Not an authorized admin.'; auth.signOut(); }
      }
    });

    // ---- nav ----
    document.querySelectorAll('nav a').forEach((a) => a.onclick = () => {
      document.querySelectorAll('nav a').forEach((x)=>x.classList.remove('active'));
      a.classList.add('active');
      ['overview','review','sources','sourcetoggle','quality','failed','config'].forEach((t)=>$(t).classList.toggle('hidden', t!==a.dataset.tab));
    });
    $('refreshBtn').onclick = loadAll;

    async function loadAll() { await Promise.all([loadOverview(), loadReview(), loadSources(), loadSourceToggle(), loadQuality(), loadFailed(), loadConfig()]); }

    // ---- marketplace config editor ----
    const CONFIG_SCHEMA_VERSION = 1;
    async function loadConfig() {
      try {
        const snap = await db.collection('marketplace_config').doc('live').get();
        const cfg = snap.exists ? snap.data() : {};
        // Strip server-managed fields from the editable view.
        const view = { ...cfg }; delete view.updatedAt;
        $('config').innerHTML =
          '<h2>Marketplace Config <small style="color:#888">v' + (cfg.version || '?') + ' · schema ' + (cfg.schemaVersion || '?') + '</small></h2>' +
          '<p style="color:#666">Edits apply to the live website immediately and to apps on next launch/refresh — no app-store update needed. Saving validates JSON and bumps the version.</p>' +
          '<div id="cfgMsg" style="margin:8px 0;font-weight:600"></div>' +
          '<textarea id="cfgText" spellcheck="false" style="width:100%;height:60vh;font-family:monospace;font-size:13px;padding:10px;border:1px solid #ccc;border-radius:8px"></textarea>' +
          '<div style="margin-top:10px"><button id="cfgValidate">Validate</button> <button id="cfgSave">Save</button></div>';
        $('cfgText').value = JSON.stringify(view, null, 2);
        $('cfgValidate').onclick = () => { const r = validateCfg(); $('cfgMsg').textContent = r.ok ? '✓ Valid JSON' : '✗ ' + r.error; $('cfgMsg').style.color = r.ok ? '#137333' : '#c5221f'; };
        $('cfgSave').onclick = saveConfig;
      } catch (e) { $('config').innerHTML = '<p style="color:#c5221f">Failed to load config: ' + esc(e.message) + '</p>'; }
    }
    function validateCfg() {
      try {
        const parsed = JSON.parse($('cfgText').value);
        if (typeof parsed !== 'object' || !parsed) return { ok: false, error: 'Top level must be an object' };
        if (parsed.schemaVersion != null && Number(parsed.schemaVersion) !== CONFIG_SCHEMA_VERSION)
          return { ok: false, error: 'schemaVersion must be ' + CONFIG_SCHEMA_VERSION + ' (the app ignores unknown schemas)' };
        return { ok: true, parsed };
      } catch (e) { return { ok: false, error: e.message }; }
    }
    async function saveConfig() {
      const r = validateCfg();
      if (!r.ok) { $('cfgMsg').textContent = '✗ ' + r.error; $('cfgMsg').style.color = '#c5221f'; return; }
      try {
        const cfg = r.parsed;
        cfg.schemaVersion = CONFIG_SCHEMA_VERSION;
        cfg.version = (Number(cfg.version) || 0) + 1;
        cfg.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
        cfg.updatedBy = (auth.currentUser && auth.currentUser.email) || 'admin';
        await db.collection('marketplace_config').doc('live').set(cfg, { merge: false });
        $('cfgMsg').textContent = '✓ Saved (version ' + cfg.version + ')';
        $('cfgMsg').style.color = '#137333';
        loadConfig();
      } catch (e) { $('cfgMsg').textContent = '✗ Save failed: ' + e.message; $('cfgMsg').style.color = '#c5221f'; }
    }

    // ---- Sources: enable/disable (writes marketplace_config/live .ingestion.disabledSources) ----
    // Canonical source ids come from the ingestion registry (sources/*.json +
    // connectors/*.js). The engine (sync.js) skips any id listed in
    // .ingestion.disabledSources. Keep this list in sync with the registry.
    const SOURCE_IDS = [
      'adzuna-jobs','arbeitnow-jobs','jobicy-jobs','remotive-jobs','remoteok-jobs',
      'themuse-jobs','weworkremotely-jobs','sample-csv',
      'insideairbnb-rentals','insideairbnb-rentals-extra',
      'osm-africa-businesses','osm-diaspora-african','hipolabs-universities-africa',
      'openfacts-products','dummyjson-products','ebay-products','dogceo-pets',
      'nager-holidays-events',
      'tmpl-agriculture-feed','tmpl-cars-api','tmpl-events-api','tmpl-generic-rss',
      'tmpl-generic-xml','tmpl-jobs-adzuna','tmpl-pets-petfinder','tmpl-products-affiliate',
      'tmpl-realestate-api','tmpl-rentals-api','TEMPLATE-licensed-feed',
    ];
    async function loadSourceToggle() {
      let disabled = [];
      try {
        const snap = await db.collection('marketplace_config').doc('live').get();
        const cfg = snap.exists ? snap.data() : {};
        disabled = (cfg.ingestion && Array.isArray(cfg.ingestion.disabledSources)) ? cfg.ingestion.disabledSources : [];
      } catch (e) {
        $('sourcetoggle').innerHTML = '<p style="color:#c5221f">Failed to load config: ' + esc(e.message) + '</p>'; return;
      }
      const disabledSet = new Set(disabled);
      // Surface any disabled id not in the known list (e.g. a retired source) so it
      // can still be re-enabled from the UI rather than being silently dropped.
      const ids = [...SOURCE_IDS];
      for (const id of disabled) if (!ids.includes(id)) ids.push(id);
      const rows = ids.map((id) => {
        const off = disabledSet.has(id);
        return `<tr><td><b>${esc(id)}</b>${SOURCE_IDS.includes(id)?'':' <span class="tag warn">unknown</span>'}</td>
          <td>${off ? '<span class="tag warn">disabled</span>' : '<span class="tag">enabled</span>'}</td>
          <td class="row-actions"><button class="${off?'bad':'ok'}" onclick="window.__toggleSource('${esc(id)}', ${off})">${off?'Enable':'Disable'}</button></td></tr>`;
      }).join('');
      $('sourcetoggle').innerHTML =
        '<h2>Sources <small style="color:#888">enable / disable ingestion (no app build)</small></h2>' +
        '<p class="muted">Toggling writes <code>ingestion.disabledSources</code> in <code>marketplace_config/live</code>. The sync engine skips disabled sources on its next run. Other config fields are untouched.</p>' +
        '<div id="srcMsg" style="margin:8px 0;font-weight:600"></div>' +
        `<table><tr><th>Source ID</th><th>State</th><th>Action</th></tr>${rows}</table>`;
    }
    window.__toggleSource = async (id, currentlyOff) => {
      const msg = $('srcMsg'); if (msg) { msg.textContent = 'Saving…'; msg.style.color = '#888'; }
      try {
        const ref = db.collection('marketplace_config').doc('live');
        const snap = await ref.get();
        const cfg = snap.exists ? snap.data() : {};
        const cur = (cfg.ingestion && Array.isArray(cfg.ingestion.disabledSources)) ? cfg.ingestion.disabledSources : [];
        const set = new Set(cur);
        if (currentlyOff) set.delete(id); else set.add(id);   // toggle OFF -> add, ON -> remove
        const next = [...set].sort();
        // Merge: only touch ingestion.disabledSources, never clobber other config.
        await ref.set({
          ingestion: { disabledSources: next },
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: (auth.currentUser && auth.currentUser.email) || 'admin',
        }, { merge: true });
        if (msg) { msg.textContent = '✓ ' + id + (currentlyOff ? ' enabled' : ' disabled'); msg.style.color = '#137333'; }
        loadSourceToggle();
      } catch (e) {
        if (msg) { msg.textContent = '✗ Save failed: ' + e.message; msg.style.color = '#c5221f'; }
      }
    };

    // ---- Source Quality (reads data_stats/source_quality, written by ingestion/compute-source-quality.js) ----
    async function loadQuality() {
      let x;
      try {
        const snap = await db.collection('data_stats').doc('source_quality').get();
        if (!snap.exists) { $('quality').innerHTML = '<p class="muted">No data yet. Run <code>node ingestion/compute-source-quality.js</code> (or the daily workflow) to populate <code>data_stats/source_quality</code>.</p>'; return; }
        x = snap.data();
      } catch (e) { $('quality').innerHTML = '<p style="color:#c5221f">Failed to load: ' + esc(e.message) + '</p>'; return; }
      const when = x.computedAt && x.computedAt.toDate ? x.computedAt.toDate().toISOString().slice(0,16).replace('T',' ') : (x.computedAtIso || '').slice(0,16).replace('T',' ');
      const catRows = Object.entries(x.byCategory || {}).map(([k,v]) => `<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('');
      const srcRows = Object.entries(x.bySource || {}).map(([k,v]) => `<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('');
      const empty = x.emptySubcategories || [];
      const emptyList = empty.length ? empty.map((s)=>`<span class="tag warn" style="margin:2px;display:inline-block">${esc(s)}</span>`).join(' ') : '<span class="muted">None — every subcategory has listings 🎉</span>';
      $('quality').innerHTML = `
        <h2>Source Quality <small style="color:#888">read-only · last updated ${esc(when)} UTC</small></h2>
        <div class="cards">
          <div class="card"><div class="n">${x.total||0}</div><div class="l">Active listings</div></div>
          <div class="card"><div class="n">${x.noContact||0}</div><div class="l">No-contact listings</div></div>
          <div class="card"><div class="n">${Object.keys(x.byCategory||{}).length}</div><div class="l">Categories</div></div>
          <div class="card"><div class="n">${Object.keys(x.bySource||{}).length}</div><div class="l">Sources</div></div>
          <div class="card"><div class="n">${(empty).length}</div><div class="l">Empty subcategories</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div><h3>By category</h3><table><tr><th>Category</th><th>Listings</th></tr>${catRows||'<tr><td colspan=2 class=muted>—</td></tr>'}</table></div>
          <div><h3>By source</h3><table><tr><th>Source</th><th>Listings</th></tr>${srcRows||'<tr><td colspan=2 class=muted>—</td></tr>'}</table></div>
        </div>
        <h3 style="margin-top:24px">Empty subcategories (${empty.length})</h3>
        <p class="muted">Taxonomy subcategories with zero active listings — ingestion gaps to fill.</p>
        <div>${emptyList}</div>`;
    }

    // ---- Overview + Source Health (from ingestion_stats) ----
    async function getRecentRuns(n=200){
      const s = await db.collection('ingestion_stats').orderBy('at','desc').limit(n).get().catch(()=>({forEach(){}}));
      const runs=[]; s.forEach((d)=>runs.push(d.data())); return runs;
    }
    async function loadOverview() {
      const runs = await getRecentRuns();
      const sum = runs.reduce((a,r)=>({published:a.published+(r.published||0),review:a.review+(r.review||0),rejected:a.rejected+(r.rejected||0),total:a.total+(r.total||0)}),{published:0,review:0,rejected:0,total:0});
      let pending=0; try{ const p = await db.collection('listings_staging').where('status','==','pending').get(); pending=p.size; }catch(e){}
      $('overview').innerHTML = `
        <div class="cards">
          <div class="card"><div class="n">${sum.published}</div><div class="l">Auto-published (recent)</div></div>
          <div class="card"><div class="n">${pending}</div><div class="l">Pending review</div></div>
          <div class="card"><div class="n">${sum.rejected}</div><div class="l">Rejected (recent)</div></div>
          <div class="card"><div class="n">${sum.total}</div><div class="l">Records seen (recent)</div></div>
          <div class="card"><div class="n">${runs.length}</div><div class="l">Sync runs logged</div></div>
        </div>
        <p class="muted">Recent stats from <code>ingestion_stats</code>. Pending from <code>listings_staging</code>.</p>`;
    }
    async function loadSources() {
      const runs = await getRecentRuns(500);
      const by = {};
      for (const r of runs) { const k=r.sourceId||'?'; (by[k]=by[k]||[]).push(r); }
      const rows = Object.entries(by).map(([id,rs])=>{
        const last=rs[0]; const pub=rs.reduce((a,r)=>a+(r.published||0),0);
        const health = (last.rejected||0) > (last.published||0) ? 'warn' : '';
        return `<tr><td><b>${esc(id)}</b></td><td>${esc((last.finishedAt||'').slice(0,16).replace('T',' '))}</td>
          <td>${last.published||0}</td><td>${last.review||0}</td><td>${last.rejected||0}</td>
          <td>${pub}</td><td><span class="tag ${health}">${health?'check':'ok'}</span></td></tr>`;
      }).join('');
      $('sources').innerHTML = `<table><tr><th>Source</th><th>Last run</th><th>Pub</th><th>Review</th><th>Rej</th><th>Total pub</th><th>Health</th></tr>${rows||'<tr><td colspan=7 class=muted>No runs yet.</td></tr>'}</table>`;
    }

    // ---- Review queue (approve -> publish to listings, reject) ----
    async function loadReview() {
      let snap; try { snap = await db.collection('listings_staging').where('status','==','pending').limit(100).get(); }
      catch(e){ $('review').innerHTML=`<p class="muted">Cannot read listings_staging (${esc(e.message)}). Deploy admin Firestore rules.</p>`; return; }
      const rows=[]; snap.forEach((d)=>{ const x=d.data(); const l=x.listing||{};
        const tag = x.reason && x.reason.startsWith('duplicate') ? 'dup' : 'warn';
        rows.push(`<tr id="rev_${d.id}">
          <td><b>${esc(l.title)}</b><br><span class="muted">${esc(l.category||l.categoryId)} · ${esc(l.city||l.country||'')} · ${esc(l.currency||'')} ${esc(l.amount||'')}</span>
            ${l.sourceUrl?`<br><a class="ext" href="${esc(l.sourceUrl)}" target="_blank">source ↗</a>`:''}</td>
          <td><span class="tag ${tag}">${esc(x.reason)}</span>${x.similarity?`<br><span class="muted">sim ${(x.similarity).toFixed(2)}</span>`:''}<br><span class="muted">q ${l.qualityScore??'?'}</span></td>
          <td>${esc(x.source)}</td>
          <td class="row-actions"><button class="ok" onclick="window.__approve('${d.id}')">Approve</button>
            <button class="bad" onclick="window.__reject('${d.id}')">Reject</button></td></tr>`);
      });
      $('review').innerHTML = `<table><tr><th>Listing</th><th>Flag</th><th>Source</th><th>Action</th></tr>${rows.join('')||'<tr><td colspan=4 class=muted>Queue empty 🎉</td></tr>'}</table>`;
    }
    window.__approve = async (id) => {
      const ref = db.collection('listings_staging').doc(id);
      const doc = await ref.get(); const x = doc.data(); if (!x) return;
      const listing = { ...(x.listing||{}), status:'active', approvedAt: firebase.firestore.FieldValue.serverTimestamp(), approvedBy: auth.currentUser.email, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      await db.collection('listings').add(listing);
      await ref.update({ status:'approved', reviewedBy: auth.currentUser.email, reviewedAt: firebase.firestore.FieldValue.serverTimestamp() });
      const el=$('rev_'+id); if(el) el.remove();
    };
    window.__reject = async (id) => {
      await db.collection('listings_staging').doc(id).update({ status:'rejected', reviewedBy: auth.currentUser.email, reviewedAt: firebase.firestore.FieldValue.serverTimestamp() });
      const el=$('rev_'+id); if(el) el.remove();
    };

    // ---- Failed imports ----
    async function loadFailed() {
      let snap; try { snap = await db.collection('import_failures').orderBy('createdAt','desc').limit(50).get(); }
      catch(e){ $('failed').innerHTML=`<p class="muted">Cannot read import_failures (${esc(e.message)}).</p>`; return; }
      const rows=[]; snap.forEach((d)=>{ const x=d.data();
        rows.push(`<tr><td>${esc(x.source||'?')}</td><td>${esc(x.reason||x.error||'')}</td><td class="muted">${esc((x.raw&&(x.raw.title||x.raw.ext_id))||'')}</td></tr>`); });
      $('failed').innerHTML = `<table><tr><th>Source</th><th>Reason</th><th>Item</th></tr>${rows.join('')||'<tr><td colspan=3 class=muted>None 🎉</td></tr>'}</table>`;
    }
  })();
  </script>
</body>
</html>
